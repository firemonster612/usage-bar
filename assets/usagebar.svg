<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Editable source for the UsageBar application icon. Render it with
       Inkscape at 256 by 256 pixels to assets/usagebar-256.png.
       Geometry: dial centred on (128, 137), radius 62, stroke 22.
       The track sweeps 270 degrees from 135 to 45 (open at the bottom); the
       fill and the needle both stop at 324 degrees, i.e. 70 percent of scale.
       assets/usagebar-symbolic.svg is the single-colour tray version of this. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3242"/>
      <stop offset="1" stop-color="#161b25"/>
    </linearGradient>
    <linearGradient id="level" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#29b3a0"/>
      <stop offset="1" stop-color="#5fdcb4"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#tile)"/>
  <rect x="17" y="17" width="222" height="222" rx="51" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <g fill="none" stroke-width="22" stroke-linecap="round">
    <path d="M84.16 180.84A62 62 0 1 1 171.84 180.84" stroke="#3a4459"/>
    <path d="M84.16 180.84A62 62 0 1 1 178.16 100.56" stroke="url(#level)"/>
  </g>

  <g fill="#f0f4f8">
    <path d="M128 137 161.17 112.89" fill="none" stroke="#f0f4f8" stroke-width="12" stroke-linecap="round"/>
    <circle cx="128" cy="137" r="11"/>
    <circle cx="128" cy="137" r="4" fill="#1b212c"/>
  </g>
</svg>
